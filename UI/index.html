<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChIP Genome Viewer</title>
    <link rel="stylesheet" href="styles.css?v=2" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Interactive genome browser preview</p>
          <h1>Mab genes and SigHP1 peaks</h1>
          <p class="subtext">
            Green bars show genes from the Mab annotation; blue bars show SigHP1 peaks.
            Scroll horizontally to explore the coordinate system and use the zoom controls to inspect regions closely.
          </p>
        </div>
        <div class="legend">
          <div class="legend-item">
            <span class="legend-swatch gene"></span>
            <span>Genes</span>
          </div>
          <div class="legend-item">
            <span class="legend-swatch peak"></span>
            <span>Peaks</span>
          </div>
        </div>
      </header>

      <section class="toolbar">
        <div class="button-group">
          <button id="pan-left" type="button">← Pan left</button>
          <button id="pan-right" type="button">Pan right →</button>
          <button id="zoom-in" type="button">Zoom in</button>
          <button id="zoom-out" type="button">Zoom out</button>
          <button id="reset" type="button">Reset view</button>
        </div>
        <div id="status" class="status">Loading genome tracks…</div>
      </section>

      <section class="chart-card">
        <div id="chart-container" class="chart-scroll">
          <svg id="chart" role="img" aria-label="Genome coordinate chart"></svg>
        </div>
      </section>
    </div>

    <script src="app.js?v=13"></script>
  </body>
</html>
